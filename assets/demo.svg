<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420" viewBox="0 0 640 420">
  <style>
    .term-bg { fill: #1e1e2e; }
    .term-bar { fill: #313244; }
    .dot-red { fill: #f38ba8; }
    .dot-yellow { fill: #f9e2af; }
    .dot-green { fill: #a6e3a1; }
    .prompt { fill: #89b4fa; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; }
    .cmd { fill: #cdd6f4; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; }
    .output { fill: #a6adc8; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; }
    .success { fill: #a6e3a1; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; }
    .highlight { fill: #f9e2af; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; }
    .score { fill: #89b4fa; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; font-weight: bold; }

    @keyframes typing { from { opacity: 0; } to { opacity: 1; } }
    .line1 { animation: typing 0.1s ease-in 0.5s both; }
    .line2 { animation: typing 0.1s ease-in 1.0s both; }
    .line3 { animation: typing 0.1s ease-in 1.3s both; }
    .line4 { animation: typing 0.1s ease-in 1.6s both; }
    .line5 { animation: typing 0.1s ease-in 1.9s both; }
    .line6 { animation: typing 0.1s ease-in 2.2s both; }
    .line7 { animation: typing 0.1s ease-in 2.5s both; }
    .line8 { animation: typing 0.1s ease-in 2.8s both; }
    .line9 { animation: typing 0.1s ease-in 3.1s both; }
    .line10 { animation: typing 0.1s ease-in 3.4s both; }
    .line11 { animation: typing 0.1s ease-in 3.7s both; }
    .line12 { animation: typing 0.1s ease-in 4.0s both; }
    .line13 { animation: typing 0.1s ease-in 4.3s both; }
    .line14 { animation: typing 0.1s ease-in 4.6s both; }
    .line15 { animation: typing 0.1s ease-in 4.9s both; }
    .line16 { animation: typing 0.1s ease-in 5.2s both; }
    .line17 { animation: typing 0.1s ease-in 5.5s both; }
  </style>

  <!-- Terminal window -->
  <rect class="term-bg" width="640" height="420" rx="8"/>
  <rect class="term-bar" width="640" height="32" rx="8"/>
  <rect class="term-bg" x="0" y="24" width="640" height="10"/>
  <circle class="dot-red" cx="20" cy="16" r="6"/>
  <circle class="dot-yellow" cx="40" cy="16" r="6"/>
  <circle class="dot-green" cx="60" cy="16" r="6"/>
  <text x="320" y="20" text-anchor="middle" fill="#6c7086" font-family="sans-serif" font-size="12">QuisHarness — Terminal</text>

  <!-- Line 1: clone command -->
  <g class="line1">
    <text x="16" y="60" class="prompt">$</text>
    <text x="28" y="60" class="cmd"> git clone https://github.com/.../QuisHarness.git</text>
  </g>

  <!-- Line 2: cd -->
  <g class="line2">
    <text x="16" y="80" class="prompt">$</text>
    <text x="28" y="80" class="cmd"> cd QuisHarness &amp;&amp; bash install.sh</text>
  </g>

  <!-- Line 3-4: header -->
  <g class="line3">
    <text x="16" y="108" class="highlight">QuisHarness Install Wizard</text>
  </g>
  <g class="line4">
    <text x="16" y="128" class="output">Checking prerequisites...</text>
  </g>

  <!-- Line 5-10: install steps -->
  <g class="line5">
    <text x="16" y="156" class="success">&#x2713;</text>
    <text x="32" y="156" class="output"> Backed up existing CLAUDE.md</text>
  </g>
  <g class="line6">
    <text x="16" y="176" class="success">&#x2713;</text>
    <text x="32" y="176" class="output"> Copied templates/CLAUDE.md</text>
  </g>
  <g class="line7">
    <text x="16" y="196" class="success">&#x2713;</text>
    <text x="32" y="196" class="output"> Copied rules/common/ (9 files)</text>
  </g>
  <g class="line8">
    <text x="16" y="216" class="success">&#x2713;</text>
    <text x="32" y="216" class="output"> Copied scripts/ (4 files)</text>
  </g>
  <g class="line9">
    <text x="16" y="236" class="success">&#x2713;</text>
    <text x="32" y="236" class="output"> Copied skills/examples/ (3 patterns)</text>
  </g>
  <g class="line10">
    <text x="16" y="256" class="success">&#x2713;</text>
    <text x="32" y="256" class="output"> Created agent-memory/, warnings/</text>
  </g>

  <!-- Line 11: eval header -->
  <g class="line11">
    <text x="16" y="284" class="highlight">Running eval...</text>
  </g>

  <!-- Line 12-15: eval results -->
  <g class="line12">
    <text x="16" y="312" class="output">  Directory structure:</text>
    <text x="240" y="312" class="score">19/25</text>
  </g>
  <g class="line13">
    <text x="16" y="332" class="output">  Skill activation:</text>
    <text x="240" y="332" class="score">3 skills scored</text>
  </g>
  <g class="line14">
    <text x="16" y="352" class="output">  Composite score:</text>
    <text x="240" y="352" class="score">76%</text>
  </g>

  <!-- Line 16-17: done -->
  <g class="line15">
    <text x="16" y="380" class="success">Done! Run eval scripts anytime to measure improvements.</text>
  </g>
  <g class="line16">
    <text x="16" y="400" class="prompt">$</text>
    <text x="28" y="400" class="cmd"> _</text>
  </g>
</svg>
